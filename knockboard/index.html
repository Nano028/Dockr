<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockboard | Dockr</title>

    <link rel="stylesheet" href="../styles/user.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="theme-knockboard">
    <!-- HERO -->
    <section class="hero">
      <div class="hero-content">
        <div class="hero-images">
          <img
            class="hero-img active"
            src="./assets/Nombre.png"
            alt="Knockboard"
          />
          <img class="hero-img" src="./assets/Icono XL.png" alt="KB Logo" />
        </div>
        <h1>Knockboard</h1>
        <p>Bring the head, we´ll get the bang.</p>
      </div>
    </section>

    <!-- LINKS -->
    <section class="links container">
      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://open.spotify.com/intl-es/artist/17gWVpx5mhnQfpGEc4oz3U?si=k0Opj5spTIauWGvRkvbY-A"
      >
        <span>Spotify</span>
        <img src="./assets/icono.png" />
      </a>

      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://www.youtube.com/channel/UCroHgoAGSlSq7_yDZjAap9w"
      >
        <span>YouTube</span>
        <img src="./assets/icono.png" alt="" />
      </a>

      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://www.instagram.com/knockboard_official"
      >
        <span>Instagram</span>
        <img src="./assets/icono.png" alt="" />
      </a>

      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://www.tiktok.com/@knockboardofficial?_r=1&_t=ZS-95dyoeFGEiu"
      >
        <span>TikTok</span>
        <img src="./assets/icono.png" alt="" />
      </a>
    </section>

    <!-- MULTIMEDIA -->
    <section class="multimedia">
      <!-- SPOTIFY -->
      <section class="container fade">
        <div class="media spotify">
          <iframe
            src="https://open.spotify.com/embed/album/7dYKR5FbqxTzYj1UPstQOw"
            loading="lazy"
          ></iframe>
        </div>
      </section>

      <!-- YOUTUBE -->
      <section class="container fade">
        <div class="media youtube">
          <iframe
            src="https://www.youtube.com/embed/42DOdLS2PgU"
            loading="lazy"
          ></iframe>
        </div>
      </section>
    </section>

    <!-- GALERÍA -->
    <section class="gallery container fade">
      <img src="./assets/gallery/1.jpg" alt="gallery" />
      <img src="./assets/gallery/2.jpg" alt="gallery" />
      <img src="./assets/gallery/3.jpg" alt="gallery" />
      <img src="./assets/gallery/4.jpg" alt="gallery" />
      <img src="./assets/gallery/5.jpg" alt="gallery" />
      <img src="./assets/gallery/6.jpg" alt="gallery" />
    </section>

    <!-- INTEGRANTES -->
    <section class="container fade">
      <div class="members">
        <div class="member">
          <img src="./multimedia/knockboard/integrantes/Gera.jpg" />
          <div class="member-info">Gerardo (Gera) Techera - Voz</div>
        </div>

        <div class="member">
          <img src="./multimedia/knockboard/integrantes/Martin.jpeg" />
          <div class="member-info">Martín (Nano) Gonzalez - Guitarra</div>
        </div>

        <div class="member">
          <img src="./multimedia/knockboard/integrantes/Chelo.jpeg" />
          <div class="member-info">Marcelo (Chelo) Mimbacas - Bajo</div>
        </div>

        <div class="member">
          <img src="./multimedia/knockboard/integrantes/Ale.jpg" />
          <div class="member-info">Alejandro (Ale) Chacón - Batería</div>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="cta fade">
      <p class="cta-content">¿Querés tu propio Dockr?</p>
      <a class="cta-content" href="../pages/mainCreateDockr">Crear el mío</a>
    </section>

    <!-- FOOTER -->
    <footer>
      <p class="footer-text dockr">Hecho con Dockr</p>
      <p class="footer-text nano">Powered by Nano Web Design</p>
    </footer>
    <script src="../js/user.js"></script>
  </body>
</html>
